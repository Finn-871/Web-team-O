<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Event</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="edit-event-page">

  <header class="edit-header">
    <div class = "back">
    <a href="admin_home.html" class="back-button">&#8592;</a>
    </div>

    <h1 class="edit-page-title">Editing Event 1</h1>

    <button class="delete-event-top">🗑 Delete Event</button>
  </header>

  <main class="edit-event-main">

    <h3>Change Time</h3>
    <div class="edit-inline-row">
      <span>From</span>
      <input type="text" value="00:00">
      <span>To</span>
      <input type="text" value="00:00">
    </div>

    <h3>Change Date</h3>
    <div class="edit-inline-row">
      <span>Day</span>
      <input type="text">
      <span>Month</span>
      <input type="text">
      <span>Year</span>
      <input type="text">
    </div>

    <div class="edit-dropdowns">
      <div>
        <h3>Change Building</h3>
        <select id="building">
            <option value="" disabled selected>Select Building</option>
        </select>
      </div>

      <div>
        <h3>Change Room</h3>
        <select id="room">
            <option value="" disabled selected>Select Room</option>
        </select>
      </div>
    </div>

    <h3>Change Description</h3>
    <div class="edit-description-box">
      <textarea></textarea>
    </div>

    <div class="edit-actions">
      <button>✔ Save</button>
      <button>✖ Cancel</button>
    </div>

  </main>

</body>
</html>
