<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Event</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body class="edit-event-page">

  <header class="edit-header">
    <div class="back">
      <a href="admin-event-detail.html" class="back-button">&#8592;</a>
    </div>

    <h1 class="edit-page-title">Editing Event 1</h1>

    <button class="delete-event-top">🗑 Delete Event</button>
  </header>

  <main class="edit-event-main">

    <h3>Change Time</h3>
    <div class="edit-inline-row">
      <span>From</span>
      <input type="text" placeholder="User Input">
      <span>To</span>
      <input type="text" placeholder="User Input">
    </div>

    <h3>Change Date</h3>
    <div class="edit-inline-row">
      <span>Day</span>
      <input type="text" placeholder="User Input">
      <span>Month</span>
      <input type="text" placeholder="User Input">
      <span>Year</span>
      <input type="text" placeholder="User Input">
    </div>

    <div class="edit-dropdowns">
      <div>
        <h3>Change Building</h3>
        <select>
          <option>Dropdown Box</option>
        </select>
      </div>

      <div>
        <h3>Change Room</h3>
        <select>
          <option>Dropdown Box</option>
        </select>
      </div>
    </div>

    <h3>Change Description</h3>
    <div class="edit-description-box">
      <textarea placeholder="User Input"></textarea>
    </div>

    <div class="edit-actions">
      <button>✔ Save</button>
      <button>✖ Cancel</button>
    </div>

  </main>

</body>
</html>
