<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Event Detail</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body style = "background-color: lightgrey">
<header>
<div class = "back">
<a href="student_home.html" class="back-button">&#8592;</a>
</div>
<h1 style = "text-align: center;">{{ event.title if event else 'Event Details' }}</h1>
</header>
<h3 style = "text-align: center;"> Time and Date</h3>
<div class="datetime-displayD" >
    <p id="datetime">{{ event.date if event else '' }} &nbsp; </p>
  </div>
 <h3 style = "text-align: center;">Location</h3>
 <div class = "locationDisplay">
	<p>{{ event.location if event else '' }}</p>
 </div>
 <h3 style = "text-align: center;">Description</h3>
<main>
<div class = "description">

<p>{{ event.description if event else '' }}</p>
<br><br><br><br>
</div>
<div class = "detailsButton">
                  <button  title="Favourite">ADD To favourites ★</button>
                  <button  title="View details"
                          onclick="goToRegister('EVENT_ID_HERE')">register for event ✓</button>
                </div>
<div class = "googleCalander">
<br>
<button  title="Favourite">Add to google calander</button>
</main>

<script src="events.js"></script>
  <script>
   
    function updateClock() {
      const now = new Date()
      document.getElementById("datetime").textContent =
        now.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" }) +
        "  " +
        now.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" })
    }
    updateClock()
    setInterval(updateClock, 60000)
	</script>
</body>
</html>
