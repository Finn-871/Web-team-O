
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="login-registration-page">

    <div class="login-container">
        
        <h1>University Event Manager</h1>
    
        <form action="/add" method="POST">
            <input type="text" name="username" placeholder="Student/Staff ID" required>
            <input type="text" name="name" placeholder="Full name" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="password_conf" placeholder="Confirm Password" required>
            <label><input type="checkbox" name="staff"> Are you staff?</label>
            <button type="submit">Register as New User</button>
        </form>

        <a href="login.html">Log In</a> 
    </div>
</body>
</html>
